bundle:
  name: service_desk_bundle

include:
 - ./resources/*yml

variables:
 databricks_host:
   description: Databricks workspace host
   default: https://adb-062323180243.6.azuredatabricks.net
 cluster_id:
  description: Existing Databricks cluster id
  default: 0623-180243-l059n6b6

 storage_account:
   description: Azure storage account name
   default: ticketsproject

 container:
   description: Azure Storage container name
   default: csvdata

 access_key:
   description: Azure Storage access key

 targets:
  default: 
   workspace:
    host: ${var.databricks_host}

    variables:
     cluster_id: 0623-180243-l059n6b6
     storage_account: ticketsproject
     container: csvdata
     
